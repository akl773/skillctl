name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./... -count=1

      - name: Run go vet
        run: go vet ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          version: v2.14.3
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Wait for release assets to become downloadable
        run: bash ./scripts/wait-for-release-assets.sh

      - name: Checkout Homebrew tap repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: akl773/homebrew-skillctl
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          fetch-depth: 0
          path: homebrew-tap

      - name: Publish Homebrew formula
        run: |
          set -euo pipefail

          cp dist/*.rb homebrew-tap/

          if [ -z "$(git -C homebrew-tap status --porcelain -- '*.rb')" ]; then
            echo "No Homebrew formula updates to publish."
            exit 0
          fi

          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add '*.rb'
          git -C homebrew-tap commit -m "Update skillctl formula for ${GITHUB_REF_NAME}"
          git -C homebrew-tap push
